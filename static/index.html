<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>RSI + OrderBook</title>

<style>
body {
  font-family: Arial;
  background: #f0f2f5;
  margin: 0;
  padding: 20px;
}

h1 { text-align:center; }

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  text-align: center;
}

th {
  background: #4CAF50;
  color: white;
  cursor: pointer;
}

.rsi-high { background:#f28b82; font-weight:bold; }
.rsi-low { background:#ccff90; font-weight:bold; }

.ob-red { background:#f28b82; font-weight:bold; }
.ob-green { background:#ccff90; font-weight:bold; }

</style>
</head>

<body>

<h1>RSI + OrderBook Ratio</h1>

<button onclick="load()">Обновить</button>

<table>
<thead>
<tr>
  <th onclick="sort('name')">Инструмент</th>
  <th onclick="sort('ob')">Offer/Bid</th>
  <th onclick="sort('5m')">5m</th>
  <th onclick="sort('1h')">1h</th>
  <th onclick="sort('1d')">1d</th>
</tr>
</thead>

<tbody id="tb"></tbody>
</table>

<script>

let data = {};
let sortKey = "name";
let dir = 1;

function obClass(v){
  if(v === "-" || v == null) return "";
  return Number(v) < 1 ? "ob-red" : "ob-green";
}

function rsiClass(v){
  if(v === "-" || v == null) return "";
  v = Number(v);
  if(v > 70) return "rsi-high";
  if(v < 30) return "rsi-low";
  return "";
}

function render(){
  const tb = document.getElementById("tb");
  tb.innerHTML = "";

  let rows = Object.keys(data);

  rows.sort((a,b)=>{

    if(sortKey === "name"){
      return a.localeCompare(b) * dir;
    }

    const va = sortKey === "ob"
      ? data[a].ob
      : data[a][sortKey]?.RSI;

    const vb = sortKey === "ob"
      ? data[b].ob
      : data[b][sortKey]?.RSI;

    return (va - vb) * dir;
  });

  for(let name of rows){

    const r = data[name];

    tb.innerHTML += `
      <tr>
        <td>${name}</td>
        <td class="${obClass(r.ob)}">${r.ob}</td>
        <td class="${rsiClass(r["5m"]?.RSI)}">${r["5m"]?.RSI}</td>
        <td class="${rsiClass(r["1h"]?.RSI)}">${r["1h"]?.RSI}</td>
        <td class="${rsiClass(r["1d"]?.RSI)}">${r["1d"]?.RSI}</td>
      </tr>
    `;
  }
}

async function load(){
  const res = await fetch("/api/rsi");
  data = await res.json();
  render();
}

function sort(k){
  if(sortKey === k) dir *= -1;
  else { sortKey = k; dir = -1; }
  render();
}

setInterval(load, 60000);
load();

</script>

</body>
</html>
